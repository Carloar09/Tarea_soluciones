
# =============================================
# CONEXIÓN A POSTGRESQL
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/rrhh_db
spring.datasource.username=postgres
spring.datasource.password=ELIcuci

# =============================================
# HIBERNATE / JPA
# =============================================
# "update" crea/modifica tablas automáticamente. En producción usar "validate"
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# NOMBRE DE LA APP
# =============================================
spring.application.name=rrhh-backend
server.port=8080

# Carpeta donde se guardan los archivos en el servidor
archivos.ruta-base=uploads/documentos

# Tamaño máximo por archivo
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
